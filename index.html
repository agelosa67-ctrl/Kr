<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#004d40"/>
<link rel="apple-touch-icon" id="app-icon" href=""/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Paralia"/>
<title>🏖 Paralia Kratisis</title>
<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22Paralia%20Kratisis%22%2C%22short_name%22%3A%22Paralia%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23ecfdf5%22%2C%22theme_color%22%3A%22%23004d40%22%2C%22orientation%22%3A%22portrait%22%7D"/>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;-webkit-user-select:none;user-select:none;}
html{height:100%;overflow:hidden;position:fixed;width:100%;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(160deg,#ecfdf5 0%,#e0f7fa 100%);height:100%;display:flex;flex-direction:column;overflow:hidden;-webkit-text-size-adjust:100%;padding-bottom:env(safe-area-inset-bottom,0px);}
#app-root{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:none;display:flex;flex-direction:column;}
input,select,textarea{-webkit-user-select:text;user-select:text;}
input,select,textarea{font-size:16px !important;}

/* HEADER */
header{background:linear-gradient(135deg,#004d40,#00796b);padding:7px 10px;padding-top:calc(7px + env(safe-area-inset-top, 0px));position:sticky;top:0;z-index:50;color:#fff;}
.hrow{display:flex;align-items:center;gap:5px;min-height:36px;}
.sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:#fbbf24;}
.sync-dot.ok{background:#4ade80;box-shadow:0 0 6px #4ade80;}
.sync-dot.error{background:#ef4444;}
.sp{flex:1;}
.hbtn{border:none;border-radius:8px;padding:6px 10px;font-size:13px;font-weight:700;background:rgba(255,255,255,.18);color:#fff;cursor:pointer;display:inline-flex;align-items:center;gap:3px;white-space:nowrap;flex-shrink:0;font-family:inherit;}
.hbtn:active{opacity:.7;}
.hbtn.danger{background:#c62828;}
.hbtn.exit-btn{background:rgba(0,0,0,.15);}
.bdg{background:#ef4444;color:#fff;border-radius:10px;padding:1px 5px;font-size:10px;margin-left:3px;font-weight:800;}

/* SEARCH */
#search-box{position:relative;}
#search-inp{border:none;border-radius:8px;padding:6px 10px;font-size:14px !important;outline:none;width:180px;background:rgba(255,255,255,.92);color:#333;}
.sr-dropdown{position:fixed;top:52px;left:0;right:0;background:#fff;border-radius:0 0 12px 12px;box-shadow:0 8px 32px rgba(0,0,0,.2);z-index:300;max-height:320px;overflow-y:auto;display:none;}
.sr-dropdown.open{display:block;}
.sr-item{display:flex;align-items:center;gap:10px;width:100%;border:none;background:#fafafa;padding:10px 14px;cursor:pointer;text-align:left;border-bottom:1px solid #f0f0f0;font-family:inherit;}
.sr-item:nth-child(even){background:#fff;}
.sr-item:active{background:#f0fdf4;}
.sr-ico{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:2px solid;font-size:10px;font-weight:800;}
.sr-name{font-weight:700;font-size:13px;color:#222;}
.sr-sub{font-size:11px;color:#888;}
.sr-empty{padding:12px 14px;font-size:13px;color:#999;}

/* DATE */
#date-box{position:relative;}
#date-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:#fff;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.18);z-index:300;padding:12px;display:none;}
#date-dropdown.open{display:block;}
#date-inp{border:1.5px solid #d1fae5;border-radius:8px;padding:7px 10px;font-size:14px !important;outline:none;font-family:inherit;}

/* LOGIN */
#login-box{position:relative;}
#login-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:#fff;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.18);z-index:300;padding:14px;min-width:220px;display:none;}
#login-dropdown.open{display:block;}
.login-title{font-size:12px;font-weight:700;color:#444;margin-bottom:8px;}
.login-row{display:flex;gap:6px;}
#pw-inp{flex:1;border:1.5px solid #d1fae5;border-radius:8px;padding:7px 10px;font-size:16px !important;outline:none;font-family:inherit;}
#pw-inp.err{border-color:#ef4444;}
.login-go{border:none;border-radius:8px;padding:0 14px;background:#004d40;color:#fff;font-weight:700;cursor:pointer;font-size:16px;font-family:inherit;}
#pw-err{font-size:11px;color:#ef4444;margin-top:6px;display:none;}

/* LEGEND */
.legend{display:flex;gap:3px;padding:5px 8px;background:#fff;border-bottom:1px solid #e2e8f0;flex-wrap:nowrap;align-items:center;overflow-x:auto;}
.lbtn{display:inline-flex;align-items:center;gap:3px;cursor:pointer;padding:3px 7px;border:1.5px solid transparent;background:transparent;border-radius:20px;font-size:11px;color:#444;font-family:inherit;white-space:nowrap;}
.lbtn.active{background:#e0f7fa;border-color:#00796b;}
.ldot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0;}
.lcount{font-weight:700;font-size:12px;color:#333;}
.clr-btn{color:#00796b;font-weight:700;border:none;background:transparent;cursor:pointer;font-size:12px;padding:3px 6px;font-family:inherit;white-space:nowrap;}
.row-chips{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-left:auto;}
.rtxt{font-size:11px;color:#888;}
.rchip{border-radius:6px;padding:3px 7px;font-size:11px;font-weight:600;cursor:pointer;background:#f1f5f9;color:#555;border:1px solid #e2e8f0;font-family:inherit;white-space:nowrap;}
.rchip.active{background:#004d40;color:#fff;border:none;}
.viewer-tag{font-size:11px;color:#bbb;margin-left:4px;}

/* GRID */
.grid-row{display:flex;align-items:flex-start;margin-bottom:6px;}
.row-num{font-size:10px;font-weight:800;color:#059669;min-width:26px;padding-top:12px;text-align:right;padding-right:6px;flex-shrink:0;}
.umbs{display:flex;gap:4px;flex-wrap:nowrap;padding-bottom:4px;}
.umbs.wrap-mode{flex-wrap:wrap;}
.umb.big{width:64px;height:76px;}
.umb-line.big{max-width:60px;font-size:10px;white-space:normal;word-break:break-word;line-height:1.2;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.umb{width:56px;height:72px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2px;flex-shrink:0;border:2px solid transparent;cursor:pointer;}
.umb:active{opacity:.7;}
.umb.viewer-mode{cursor:default;}
.umb.hidden{background:transparent !important;border:1px dashed #ddd !important;opacity:.2;}
.umb-num{font-size:11px;font-weight:900;line-height:1.2;margin-top:1px;}
.umb-line{font-size:10px;font-weight:700;line-height:1.2;text-align:center;max-width:52px;white-space:normal;word-break:break-word;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
/* ZOOM BUTTONS */
.zoom-bar{display:flex;align-items:center;justify-content:flex-end;gap:6px;padding:4px 10px 0;background:transparent;}
.zbtn{width:34px;height:34px;border-radius:50%;border:none;background:rgba(0,77,64,.13);color:#004d40;font-size:20px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;flex-shrink:0;}
.zbtn:active{background:rgba(0,77,64,.28);}
.zlvl{font-size:11px;font-weight:700;color:#888;min-width:34px;text-align:center;}

/* OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:100;}

/* MODAL */
.modal{background:#fff;border-radius:20px 20px 0 0;overflow:hidden;width:100%;max-width:480px;box-shadow:0 -8px 40px rgba(0,0,0,.2);position:relative;max-height:90vh;display:flex;flex-direction:column;}
.mstrip{height:5px;flex-shrink:0;}
.big-x{position:absolute;top:12px;right:12px;width:34px;height:34px;border-radius:50%;border:none;background:#dc2626;color:#fff;font-size:17px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:20;line-height:1;}
.mbody{padding:14px 18px 8px;overflow-y:auto;flex:1;}
.mtitle{font-size:21px;font-weight:900;color:#004d40;line-height:1;}
.msub{font-size:12px;color:#888;margin-top:2px;margin-bottom:12px;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.icard{background:#f8fafc;border-radius:10px;padding:8px 11px;}
.icard.wide{grid-column:1/-1;}
.ilabel{display:block;font-size:10px;color:#888;margin-bottom:2px;}
.ival{font-size:14px;font-weight:700;color:#1e293b;}
.type-row{display:flex;gap:6px;margin-bottom:12px;}
.tbtn{flex:1;padding:8px 0;border-radius:10px;cursor:pointer;font-size:13px;font-weight:700;border:2px solid #e2e8f0;background:#f8fafc;color:#aaa;font-family:inherit;}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px;}
.fgrid .full{grid-column:1/-1;}
.flabel{display:block;font-size:11px;color:#555;margin-bottom:4px;font-weight:700;}
.finp{width:100%;border:1.5px solid #d1fae5;border-radius:10px;padding:9px 11px;font-size:16px !important;outline:none;font-family:inherit;background:#f8fafc;}
.finp:focus{border-color:#00796b;}
textarea.finp{height:52px;resize:none;}
.mactions{display:flex;gap:8px;margin-top:4px;}
.sticky-acts{display:flex;gap:8px;padding:10px 18px 24px;border-top:1px solid #f0fdf4;background:#fff;flex-shrink:0;position:sticky;bottom:0;z-index:10;}
.btn{flex:1;padding:13px 0;border-radius:12px;border:none;font-weight:800;font-size:15px;cursor:pointer;font-family:inherit;}
.btn-save{background:#059669;color:#fff;}
.btn-cancel{background:#f1f5f9;color:#64748b;}
.btn-edit{background:#0284c7;color:#fff;}
.btn-del{background:#dc2626;color:#fff;}
.list-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f0fdf4;gap:8px;}
.sbtn{border:none;border-radius:8px;padding:7px 13px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit;}
.cfg-umbs{display:flex;flex-wrap:wrap;gap:5px;}
.cu{display:flex;flex-direction:column;align-items:center;gap:3px;border-radius:10px;padding:6px 7px;border:1.5px solid;}
.cu.on{background:#f0fdf4;border-color:#86efac;}
.cu.off{background:#f8fafc;border-color:#e2e8f0;}
.cu input[type=text]{width:40px;border:none;text-align:center;font-weight:800;font-size:12px;background:transparent;outline:none;color:#333;font-family:inherit;}
.cu-btns{display:flex;gap:4px;align-items:center;}
.cu-add{width:50px;min-height:58px;border-radius:10px;border:2px dashed #86efac;background:transparent;cursor:pointer;font-size:22px;color:#4ade80;font-weight:900;font-family:inherit;}
.add-row-btn{width:100%;padding:10px;border-radius:12px;border:2px dashed #86efac;background:transparent;color:#059669;font-weight:700;font-size:14px;cursor:pointer;margin-bottom:4px;font-family:inherit;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);color:#fff;padding:11px 22px;border-radius:50px;font-size:14px;font-weight:700;box-shadow:0 6px 20px rgba(0,0,0,.25);z-index:400;white-space:nowrap;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}
.toast.s{background:#15803d;}
.toast.i{background:#1d4ed8;}
.toast.e{background:#dc2626;}

/* QUICK POPUP */
#quick-popup{position:fixed;z-index:500;background:#fff;border-radius:18px;box-shadow:0 8px 40px rgba(0,0,0,.28);padding:14px 16px 12px;width:230px;display:none;flex-direction:column;gap:8px;}
#quick-popup.show{display:flex;}
.qp-title{font-size:13px;font-weight:900;color:#004d40;text-align:center;}
.qp-status-row{display:flex;gap:6px;}
.qp-sbtn{flex:1;padding:7px 0;border-radius:10px;font-size:12px;font-weight:700;border:2px solid #e2e8f0;background:#f8fafc;color:#aaa;cursor:pointer;font-family:inherit;}
.qp-sbtn.active-booked{background:#FF5252;border-color:#c62828;color:#fff;}
.qp-sbtn.active-special{background:#FFD600;border-color:#F9A825;color:#92400e;}
.qp-inp{width:100%;border:1.5px solid #d1fae5;border-radius:10px;padding:9px 11px;font-size:16px;outline:none;font-family:inherit;background:#f8fafc;}
.qp-inp:focus{border-color:#00796b;}
.qp-ac{background:#fff;border:1px solid #e2e8f0;border-radius:10px;max-height:130px;overflow-y:auto;display:none;}
.qp-ac.show{display:block;}
.qp-ac-item{padding:8px 12px;font-size:13px;font-weight:600;color:#333;cursor:pointer;border-bottom:1px solid #f0f0f0;}
.qp-ac-item:last-child{border-bottom:none;}
.qp-ac-item:active{background:#f0fdf4;}
.qp-actions{display:flex;gap:6px;}
.qp-save{flex:1;padding:11px;border-radius:12px;border:none;background:#059669;color:#fff;font-weight:800;font-size:14px;cursor:pointer;font-family:inherit;}
.qp-save:active{opacity:.8;}
.qp-cancel{width:42px;padding:11px;border-radius:12px;border:none;background:#f1f5f9;color:#64748b;font-weight:800;font-size:14px;cursor:pointer;font-family:inherit;}

/* MULTI SELECT */
.umb.multi-selected{outline:3px solid #004d40;outline-offset:1px;}
#multi-bar{position:fixed;bottom:0;left:0;right:0;z-index:300;background:#004d40;color:#fff;padding:12px 16px;padding-bottom:calc(12px + env(safe-area-inset-bottom,0px));display:none;flex-direction:column;gap:8px;}
#multi-bar.show{display:flex;}
.mb-top{display:flex;align-items:center;gap:8px;}
.mb-label{flex:1;font-size:13px;font-weight:800;}
.mb-cancel{border:none;background:rgba(255,255,255,.2);color:#fff;border-radius:8px;padding:6px 12px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;}
.mb-inp{width:100%;border:none;border-radius:10px;padding:9px 12px;font-size:16px;outline:none;font-family:inherit;background:#fff;color:#333;}
.mb-ac{background:#fff;border-radius:10px;max-height:120px;overflow-y:auto;display:none;}
.mb-ac.show{display:block;}
.mb-ac-item{padding:8px 12px;font-size:13px;font-weight:600;color:#333;cursor:pointer;border-bottom:1px solid #f0f0f0;}
.mb-ac-item:last-child{border-bottom:none;}
.mb-ac-item:active{background:#f0fdf4;}
.mb-actions{display:flex;gap:6px;}
.mb-save{flex:1;padding:11px;border-radius:12px;border:none;background:#4ade80;color:#004d40;font-weight:900;font-size:14px;cursor:pointer;font-family:inherit;}
.mb-del{padding:11px 16px;border-radius:12px;border:none;background:#dc2626;color:#fff;font-weight:900;font-size:14px;cursor:pointer;font-family:inherit;}

/* UNDO BAR */
#undo-bar{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:450;background:#1e293b;color:#fff;border-radius:50px;padding:10px 18px;display:none;align-items:center;gap:12px;box-shadow:0 4px 20px rgba(0,0,0,.3);white-space:nowrap;}
#undo-bar.show{display:flex;}
#undo-bar span{font-size:13px;font-weight:600;}
#undo-btn{border:none;background:#4ade80;color:#004d40;border-radius:20px;padding:5px 14px;font-weight:900;font-size:13px;cursor:pointer;font-family:inherit;}

</style>
</head>
<body>

<div id="app-root">
<div id="app">
  <header>
    <div class="hrow">
      <div id="sync-dot" class="sync-dot" title="Σύνδεση…"></div>
      <div class="sp"></div>

      <!-- SEARCH -->
      <div id="search-box">
        <div id="search-closed">
          <button class="hbtn" onclick="openSearch()">🔍</button>
        </div>
        <div id="search-open" style="display:none;align-items:center;gap:4px;">
          <input id="search-inp" placeholder="Όνομα, αριθμός, υπάλληλος…"
            oninput="doSearch()" autocomplete="off" autocorrect="off" spellcheck="false"/>
          <button class="hbtn" onclick="closeSearch()">✕</button>
        </div>
        <div id="sr-dropdown" class="sr-dropdown"></div>
      </div>

      <!-- ADMIN BUTTONS -->
      <div id="admin-btns" style="display:none;align-items:center;gap:4px;">
        <button class="hbtn" onclick="openPanel('staff')">Προσωπικό</button>
        <button class="hbtn" onclick="openConfig()">⚙</button>
        <button class="hbtn" id="trash-btn" onclick="openPanel('trash')">↩</button>
        <button class="hbtn" onclick="openPanel('history')">📋</button>
        <button class="hbtn danger" id="clear-confirm-btn" style="display:none" onclick="clearAllToday()">Επιβεβαίωση</button>
        <button class="hbtn" id="clear-btn" onclick="showClearPickerModal()">🗑</button>
        <button class="hbtn exit-btn" onclick="doLogout()">Έξοδος</button>
      </div>

      <!-- LOGIN -->
      <div id="login-box">
        <button class="hbtn" onclick="toggleLogin()">🔒</button>
        <div id="login-dropdown">
          <div class="login-title">Κωδικός διαχειριστή</div>
          <div class="login-row">
            <input id="pw-inp" type="password" placeholder="••••••••"
              onkeydown="if(event.key==='Enter')doLogin()"/>
            <button class="login-go" onclick="doLogin()">→</button>
          </div>
          <label style="display:flex;align-items:center;gap:6px;margin-top:8px;font-size:12px;color:#555;cursor:pointer;">
            <input type="checkbox" id="remember-chk" style="accent-color:#004d40;width:14px;height:14px;"/>
            Να με θυμάσαι
          </label>
          <div id="pw-err">Λάθος κωδικός</div>
        </div>
      </div>
    </div>
  </header>

  <!-- LEGEND -->
  <div class="legend">
    <button class="lbtn" id="lb-free"    onclick="toggleFilter('free')">
      <span class="ldot" style="background:#f0fdf4;border:1.5px solid #86efac"></span>
      <span class="lcount" id="cnt-free">0</span><span>Ελεύθερη</span>
    </button>
    <button class="lbtn" id="lb-booked"  onclick="toggleFilter('booked')">
      <span class="ldot" style="background:#FF5252;border:1.5px solid #c62828"></span>
      <span class="lcount" id="cnt-booked">0</span><span>Κρατημένη</span>
    </button>
    <button class="lbtn" id="lb-special" onclick="toggleFilter('special')">
      <span class="ldot" style="background:#FFD600;border:1.5px solid #F9A825"></span>
      <span class="lcount" id="cnt-special">0</span><span>Σπέσιαλ</span>
    </button>
    <button class="clr-btn" id="clr-filter" style="display:none" onclick="clearFilter()">✕</button>
    <span class="viewer-tag" id="viewer-tag" style="margin-left:auto;">👁</span>
  </div>

  <!-- ROW CHIPS + DATE + ZOOM -->
  <div style="display:flex;align-items:center;padding:4px 8px;gap:5px;background:#fff;border-bottom:1px solid #e2e8f0;flex-wrap:nowrap;">
    <div style="display:flex;align-items:center;gap:3px;flex-shrink:0;">
      <button class="zbtn" onclick="zoomOut()">−</button>
      <span class="zlvl" id="zlvl">100%</span>
      <button class="zbtn" onclick="zoomIn()">+</button>
    </div>
    <div id="row-chips-wrap" style="display:flex;gap:3px;flex-wrap:nowrap;overflow-x:auto;flex:1;-webkit-overflow-scrolling:touch;"></div>
    <div id="date-box" style="position:relative;flex-shrink:0;">
      <button class="hbtn" style="background:rgba(0,77,64,.12);color:#004d40;font-size:12px;padding:4px 8px;" onclick="toggleDate()" id="date-btn">📅 —</button>
      <div id="date-dropdown">
        <input id="date-inp" type="date" onchange="onDateChange(this.value)"/>
      </div>
    </div>
  </div>

  <div id="zoom-outer" style="overflow:auto;flex:1;-webkit-overflow-scrolling:touch;">
    <div id="zoom-wrapper" style="transform-origin:top left;padding:10px 6px 20px;display:inline-block;min-width:100%;">
      <div id="grid"></div>
    </div>
  </div>
</div>

<!-- RESERVATION MODAL -->
</div><!-- /app -->
</div><!-- /app-root -->

<div id="res-overlay" class="overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="big-x" onclick="closeModal()">✕</button>
    <div class="mstrip" id="res-strip"></div>
    <div class="mbody" id="res-body"></div>
    <div class="sticky-acts" id="res-footer" style="display:none">
      <button class="btn btn-cancel" onclick="closeModal()">Ακύρωση</button>
      <button class="btn btn-save" onclick="saveRes()">💾 Αποθήκευση</button>
    </div>
  </div>
</div>

<!-- PANEL (staff / trash / config) -->
<div id="panel-overlay" class="overlay" style="display:none" onclick="if(event.target===this)closePanel()">
  <div class="modal" style="max-width:440px">
    <button class="big-x" onclick="closePanel()">✕</button>
    <div class="mstrip" style="background:#004d40"></div>
    <div class="mbody" id="panel-body"></div>

<script>
// ══ FIREBASE v8 — same as working app ══
firebase.initializeApp({

});
const database = firebase.database();

// ══ CONSTANTS ══
const PASSWORD = "imperial2018";
function localToday(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
const TODAY    = localToday();

const STATUS = {
  free:    {bg:"#f0fdf4",border:"#86efac",icon:"#4ade80",text:"#555",    label:"Ελεύθερη"},
  booked:  {bg:"#FF5252",border:"#c62828",icon:"#fff",   text:"#fff",    label:"Κρατημένη"},
  special: {bg:"#FFD600",border:"#F9A825",icon:"#92400e",text:"#92400e", label:"Σπέσιαλ"},
};

// ══ STATE ══
let loggedIn     = false;
let selectedDate = TODAY;
let filterStatus = "all";
let filterRow    = 0;
let umbrellas    = buildDefault();
let staff        = [];
let reservations = {};
let trash        = {};
let cfgUmbs      = [];
let currentModal = null;
let currentForm  = {};
let toastTimer   = null;
let clearConfirmVisible = false;
let currentPanel = null;

function buildDefault(){
  const list=[];
  for(let r=1;r<=9;r++) for(let c=1;c<=23;c++)
    list.push({uid:`${r}-${c}`,row:r,label:String(r*100+c),enabled:true});
  return list;
}

function safeKey(label,date){return label+"__"+date;}
function uid(){return Math.random().toString(36).slice(2,9);}
function fmtDate(d){if(!d)return"";const[y,m,day]=d.split("-");return day+"/"+m+"/"+y;}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

// ══ FIREBASE LISTENERS ══
database.ref("reservations").on("value", snap=>{
  const data=snap.val()||{};
  reservations={};
  Object.values(data).forEach(v=>{ if(v&&v.label&&v.date) reservations[v.label+"|"+v.date]=v; });
  document.getElementById("sync-dot").className="sync-dot ok";
  renderGrid(); renderLegend();
}, ()=>{ document.getElementById("sync-dot").className="sync-dot error"; });

database.ref("config/umbrellas").on("value", snap=>{
  const data=snap.val();
  umbrellas=Array.isArray(data)?data:buildDefault();
  renderGrid(); renderLegend(); renderRowChips();
});

database.ref("config/staff").on("value", snap=>{
  const data=snap.val();
  staff=Array.isArray(data)?data:[];
});

database.ref("trash").on("value", snap=>{
  trash=snap.val()||{};
  const cnt=Object.keys(trash).length;
  const btn=document.getElementById("trash-btn");
  if(btn) btn.innerHTML="↩"+(cnt>0?'<span class="bdg">'+cnt+'</span>':"");
});

// ══ GRID ══
function getRes(label){return reservations[label+"|"+selectedDate]||null;}
function getStatusKey(label){const r=getRes(label);return r?(r.status||"booked"):"free";}

function renderGrid(){
  const rows=[...new Set(umbrellas.map(u=>u.row))].sort((a,b)=>a-b);
  const show=filterRow===0?rows:[filterRow];
  const singleRow=filterRow!==0;
  let html="";
  show.forEach(row=>{
    const rowUs=umbrellas.filter(u=>u.row===row&&u.enabled).sort((a,b)=>Number(a.label)-Number(b.label));
    if(!rowUs.length) return;
    const umbsH=rowUs.map(u=>{
      const res=getRes(u.label);
      const sk=getStatusKey(u.label);
      const future=!res?Object.values(reservations)
        .filter(r=>r.label===u.label&&r.date>selectedDate)
        .sort((a,b)=>a.date.localeCompare(b.date))[0]||null:null;
      const effectiveSk=res?sk:"free";
      const st=STATUS[effectiveSk];
      if(filterStatus!=="all"&&effectiveSk!==filterStatus)
        return `<div class="umb hidden${singleRow?" big":""}" style="width:${singleRow?64:56}px;height:${singleRow?76:72}px"></div>`;
      // Πλήρες όνομα πάντα
      const nm=res?res.name:"";
      const nc="#000";
      const tc=sk==="special"?"#92400e":"rgba(0,0,0,.6)";
      const staffPart=res&&res.staff?" · "+res.staff.split(" ")[0]:"";
      let nextTag="";
      if(!res&&future){
        const[y,m,d]=future.date.split("-");
        nextTag=`<span class="umb-line${singleRow?" big":""}" style="color:#c2410c;font-size:7px;font-weight:800;background:rgba(255,237,213,.9);border-radius:3px;padding:0 2px;line-height:1.4;">📅 ${d}/${m}</span>`;
      }
      return `<button class="umb${singleRow?" big":""}${loggedIn?"":" viewer-mode"}${multiMode&&multiSelected.has(u.uid)?" multi-selected":""}"
        onclick="onUmbClick('${u.uid}')"
        ontouchstart="onUmbTouchStart('${u.uid}',event)"
        ontouchend="onUmbTouchEnd(event)"
        style="background:${st.bg};border:2px solid ${future&&!res?"#fb923c":st.border};box-shadow:${res?"0 2px 8px rgba(0,0,0,.12)":future?"0 2px 8px rgba(251,146,60,.25)":"0 1px 3px rgba(0,0,0,.05)"}"
        title="${res?esc(res.name)+" · "+(res.time||""):future?"Κράτηση "+fmtDate(future.date)+" · "+esc(future.name):u.label}">
        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M12 2C7 2 3 6.5 3 11h9v9c0 .55.45 1 1 1s1-.45 1-1v-9h9c0-4.5-4-9-11-9z" fill="${st.icon}"/></svg>
        <span class="umb-num" style="color:${st.text}">${multiMode&&multiSelected.has(u.uid)?"✓":u.label}</span>
        ${res?`<span class="umb-line${singleRow?" big":""}" style="color:${nc}">${esc(nm)}</span>
               <span class="umb-line" style="color:${tc};font-size:8px">${res.time||""}${staffPart}</span>`:""}
        ${nextTag}
      </button>`;
    }).join("");
    html+=`<div class="grid-row"><div class="row-num">${row*100}</div><div class="umbs${singleRow?" wrap-mode":""}">${umbsH}</div></div>`;
  });
  // Στο single-row mode, κάνουμε τον wrapper block (όχι inline) για να τυλίξει σωστά
  const wrapper=document.getElementById("zoom-wrapper");
  if(singleRow){wrapper.style.display="block";wrapper.style.minWidth="0";wrapper.style.width="100%";}
  else{wrapper.style.display="inline-block";wrapper.style.minWidth="100%";wrapper.style.width="";}
  document.getElementById("grid").innerHTML=html;
}

function renderLegend(){
  const en=umbrellas.filter(u=>u.enabled);
  const booked=en.filter(u=>{const r=getRes(u.label);return r&&r.status!=="special";}).length;
  const special=en.filter(u=>{const r=getRes(u.label);return r&&r.status==="special";}).length;
  const free=en.length-booked-special;
  document.getElementById("cnt-free").textContent=free;
  document.getElementById("cnt-booked").textContent=booked;
  document.getElementById("cnt-special").textContent=special;
  ["free","booked","special"].forEach(k=>{
    document.getElementById("lb-"+k).className="lbtn"+(filterStatus===k?" active":"");
  });
  document.getElementById("clr-filter").style.display=filterStatus!=="all"?"":"none";
  document.getElementById("viewer-tag").style.display=loggedIn?"none":"";
}

function renderRowChips(){
  const rows=[...new Set(umbrellas.map(u=>u.row))].sort((a,b)=>a-b);
  let html=`<button class="rchip${filterRow===0?" active":""}" onclick="setFilterRow(0)">Όλες</button>`;
  rows.forEach(r=>{
    html+=`<button class="rchip${filterRow===r?" active":""}" onclick="setFilterRow(${r})">${r*100}</button>`;
  });
  document.getElementById("row-chips-wrap").innerHTML=html;
}

function setFilterRow(r){filterRow=(filterRow===r&&r!==0)?0:r;renderGrid();renderRowChips();}
function toggleFilter(k){filterStatus=filterStatus===k?"all":k;renderGrid();renderLegend();}
function clearFilter(){filterStatus="all";renderGrid();renderLegend();}

// ══ DATE ══
function setDate(d){
  selectedDate=d;
  document.getElementById("date-btn").textContent="📅 "+fmtDate(d);
  document.getElementById("date-inp").value=d;
  renderGrid(); renderLegend();
}
function toggleDate(){
  document.getElementById("date-dropdown").classList.toggle("open");
  document.getElementById("login-dropdown").classList.remove("open");
}
function onDateChange(v){setDate(v);document.getElementById("date-dropdown").classList.remove("open");}

// ══ LOGIN ══
function toggleLogin(){
  document.getElementById("login-dropdown").classList.toggle("open");
  document.getElementById("date-dropdown").classList.remove("open");
  if(document.getElementById("login-dropdown").classList.contains("open"))
    setTimeout(()=>document.getElementById("pw-inp").focus(),80);
}
function doLogin(){
  const val=document.getElementById("pw-inp").value;
  if(val===PASSWORD){
    loggedIn=true;
    const remember=document.getElementById("remember-chk").checked;
    if(remember) localStorage.setItem("admin_remember","1");
    else localStorage.removeItem("admin_remember");
    document.getElementById("pw-inp").value="";
    document.getElementById("pw-err").style.display="none";
    document.getElementById("pw-inp").classList.remove("err");
    document.getElementById("login-dropdown").classList.remove("open");
    document.getElementById("login-box").style.display="none";
    document.getElementById("admin-btns").style.display="flex";
    renderGrid(); renderLegend();
  } else {
    document.getElementById("pw-inp").classList.add("err");
    document.getElementById("pw-err").style.display="block";
    document.getElementById("pw-inp").value="";
    setTimeout(()=>document.getElementById("pw-inp").focus(),50);
  }
}
function doLogout(){
  loggedIn=false;
  localStorage.removeItem("admin_remember");
  document.getElementById("admin-btns").style.display="none";
  document.getElementById("login-box").style.display="";
  clearClearConfirm();
  renderGrid(); renderLegend();
}
function autoLogin(){
  if(localStorage.getItem("admin_remember")==="1"){
    loggedIn=true;
    document.getElementById("login-box").style.display="none";
    document.getElementById("admin-btns").style.display="flex";
    renderGrid(); renderLegend();
  }
}

// ══ SEARCH ══
function openSearch(){
  document.getElementById("search-closed").style.display="none";
  document.getElementById("search-open").style.display="flex";
  setTimeout(()=>document.getElementById("search-inp").focus(),60);
}
function closeSearch(){
  document.getElementById("search-closed").style.display="";
  document.getElementById("search-open").style.display="none";
  document.getElementById("search-inp").value="";
  document.getElementById("sr-dropdown").classList.remove("open");
  document.getElementById("sr-dropdown").innerHTML="";
}
function doSearch(){
  const q=(document.getElementById("search-inp").value||"").toLowerCase().trim();
  const dd=document.getElementById("sr-dropdown");
  if(!q){dd.classList.remove("open");dd.innerHTML="";return;}
  const hits=Object.values(reservations).filter(r=>
    (r.label||"").toLowerCase().includes(q)||
    (r.name||"").toLowerCase().includes(q)||
    (r.staff||"").toLowerCase().includes(q)||
    (r.notes||"").toLowerCase().includes(q)
  ).sort((a,b)=>{
    if(a.date===selectedDate&&b.date!==selectedDate)return -1;
    if(b.date===selectedDate&&a.date!==selectedDate)return 1;
    return(b.date||"").localeCompare(a.date||"");
  }).slice(0,20);
  if(!hits.length){
    dd.innerHTML='<div class="sr-empty">Δεν βρέθηκε αποτέλεσμα</div>';
    dd.classList.add("open");return;
  }
  dd.innerHTML=hits.map(r=>{
    const sk=r.status||"booked";const st=STATUS[sk]||STATUS.booked;
    return `<button class="sr-item" onclick="openFromSearch('${esc(r.label)}','${r.date}')">
      <div class="sr-ico" style="background:${st.bg};border-color:${st.border};color:${st.text}">${r.label}</div>
      <div style="flex:1;min-width:0">
        <div class="sr-name">${esc(r.name)}</div>
        <div class="sr-sub">${r.date===selectedDate?"Σήμερα":fmtDate(r.date)} · ${r.time||""}${r.staff?' · <span style="color:#059669">'+esc(r.staff)+'</span>':""}</div>
      </div>
      <span style="font-size:10px;font-weight:700;color:${st.text};background:${st.bg};border:1px solid ${st.border};border-radius:6px;padding:2px 6px;flex-shrink:0">${st.label}</span>
    </button>`;
  }).join("");
  dd.classList.add("open");
}
function openFromSearch(label,date){
  closeSearch();
  setDate(date);
  const u=umbrellas.find(x=>x.label===label)||{uid:label,label};
  openModal(u.uid,"view");
}

// ══ MODAL ══
function onUmbClick(uid){
  if(!loggedIn)return;
  if(multiMode){toggleMultiSelect(uid);return;}
  const u=umbrellas.find(x=>x.uid===uid);
  if(!u)return;
  const existing=reservations[u.label+"|"+selectedDate]||null;
  // Έλεγξε αν υπάρχουν κρατήσεις σε άλλες μέρες (παρελθόν ή μέλλον)
  const otherRes=Object.values(reservations)
    .filter(r=>r.label===u.label&&r.date!==selectedDate)
    .sort((a,b)=>a.date.localeCompare(b.date));
  if(existing){
    openModal(uid,null);
  } else if(otherRes.length>0){
    // Υπάρχουν κρατήσεις σε άλλες μέρες → άνοιξε modal με λίστα
    openModal(uid,"other_dates");
  } else {
    openQuickPopup(uid,u.label);
  }
}

// ══ LONG PRESS → MULTI SELECT ══
let multiMode=false;
let multiSelected=new Set();
let lpTimer=null;

function onUmbTouchStart(uid,e){
  if(!loggedIn)return;
  lpTimer=setTimeout(()=>{
    lpTimer=null;
    if(!multiMode){multiMode=true;multiSelected.clear();}
    toggleMultiSelect(uid);
    renderGrid();
  },500);
}
function onUmbTouchEnd(e){
  if(lpTimer){clearTimeout(lpTimer);lpTimer=null;}
}
function toggleMultiSelect(uid){
  if(multiSelected.has(uid))multiSelected.delete(uid);
  else multiSelected.add(uid);
  updateMultiBar();
  renderGrid();
}
function updateMultiBar(){
  const bar=document.getElementById("multi-bar");
  if(!multiMode||multiSelected.size===0){bar.classList.remove("show");return;}
  bar.classList.add("show");
  document.getElementById("mb-label").textContent=multiSelected.size+" ομπρέλ"+(multiSelected.size===1?"α":"ες")+" επιλεγμένες";
}
function multiCancel(){
  multiMode=false;multiSelected.clear();
  document.getElementById("multi-bar").classList.remove("show");
  renderGrid();
}
function multiSave(){
  const name=(document.getElementById("mb-name").value||"").trim();
  if(!name){showToast("Γράψε όνομα","e");return;}
  const uids=[...multiSelected];
  const labels=uids.map(uid=>umbrellas.find(u=>u.uid===uid)?.label).filter(Boolean);
  let p=Promise.resolve();
  labels.forEach(label=>{
    const entry={label,date:selectedDate,name,time:"10:00",notes:"",status:"booked",staff:"",updatedAt:new Date().toISOString()};
    p=p.then(()=>database.ref("reservations/"+safeKey(label,selectedDate)).set(entry));
  });
  p.then(()=>{showToast("✓ Κρατήθηκαν "+labels.length+" ομπρέλες","s");multiCancel();})
   .catch(()=>showToast("Σφάλμα","e"));
}
function multiDelete(){
  const uids=[...multiSelected];
  const labels=uids.map(uid=>umbrellas.find(u=>u.uid===uid)?.label).filter(Boolean);
  const toDelete=labels.filter(label=>reservations[label+"|"+selectedDate]);
  if(!toDelete.length){showToast("Δεν υπάρχουν κρατήσεις","i");multiCancel();return;}
  // Save to undo stack
  const snapshot=toDelete.map(label=>({...reservations[label+"|"+selectedDate]}));
  pushUndo(snapshot,"Διαγράφηκαν "+toDelete.length+" κρατήσεις");
  let p=Promise.resolve();
  toDelete.forEach(label=>{
    const entry=reservations[label+"|"+selectedDate];
    const trashId=uid();
    p=p.then(()=>database.ref("trash/"+trashId).set({...entry,trashId,deletedAt:new Date().toISOString()}))
       .then(()=>database.ref("reservations/"+safeKey(label,selectedDate)).remove());
  });
  p.then(()=>{multiCancel();}).catch(()=>showToast("Σφάλμα","e"));
}

// ══ QUICK POPUP ══
let qpUid=null,qpLabel=null,qpStatus="booked";
function openQuickPopup(uid,label){
  qpUid=uid;qpLabel=label;qpStatus="booked";
  document.getElementById("qp-title").textContent="Ομπρέλα "+label;
  document.getElementById("qp-name").value="";
  document.getElementById("qp-date").value=selectedDate;
  document.getElementById("qp-time").value="10:00";
  // Γέμισε υπαλλήλους
  const staffSel=document.getElementById("qp-staff");
  staffSel.innerHTML=`<option value="">— Υπάλληλος —</option>`+staff.map(s=>`<option value="${esc(s)}">${esc(s)}</option>`).join("");
  document.getElementById("qp-ac").innerHTML="";
  document.getElementById("qp-ac").classList.remove("show");
  qpRenderStatus();
  const pop=document.getElementById("quick-popup");
  pop.style.top="50%";
  pop.style.left="50%";
  pop.style.transform="translate(-50%,-50%)";
  pop.classList.add("show");
  setTimeout(()=>document.getElementById("qp-name").focus(),80);
}
function qpRenderStatus(){
  document.getElementById("qp-booked").className="qp-sbtn"+(qpStatus==="booked"?" active-booked":"");
  document.getElementById("qp-special").className="qp-sbtn"+(qpStatus==="special"?" active-special":"");
}
function qpSetStatus(s){qpStatus=s;qpRenderStatus();}
function qpClose(){document.getElementById("quick-popup").classList.remove("show");qpUid=null;qpLabel=null;}
function qpSave(){
  const name=(document.getElementById("qp-name").value||"").trim();
  if(!name){document.getElementById("qp-name").focus();return;}
  const saveDate=document.getElementById("qp-date").value||selectedDate;
  const time=document.getElementById("qp-time").value||"10:00";
  const staffVal=document.getElementById("qp-staff").value||"";
  const entry={label:qpLabel,date:saveDate,name,time,notes:"",status:qpStatus,staff:staffVal,updatedAt:new Date().toISOString()};
  database.ref("reservations/"+safeKey(qpLabel,saveDate)).set(entry)
    .then(()=>{showToast("✓ Ομπρέλα "+qpLabel+" — "+name,"s");qpClose();})
    .catch(()=>showToast("Σφάλμα","e"));
}
function qpNameInput(val){
  const ac=document.getElementById("qp-ac");
  const suggestions=getNameSuggestions(val);
  if(!suggestions.length||!val){ac.classList.remove("show");return;}
  ac.innerHTML=suggestions.map(n=>`<div class="qp-ac-item" onclick="qpPickName('${esc(n)}')">${esc(n)}</div>`).join("");
  ac.classList.add("show");
}
function qpPickName(name){

  Object.values(reservations).forEach(r=>{if(r.name&&r.name.toLowerCase().includes(q))names.add(r.name);});

// ══ UNDO ══
let undoStack=[];
let undoTimer=null;
function pushUndo(entries,msg){
  undoStack=[...entries];
  document.getElementById("undo-msg").textContent=msg||"Διαγράφηκε";
  const bar=document.getElementById("undo-bar");
  bar.classList.add("show");
  if(undoTimer)clearTimeout(undoTimer);
  undoTimer=setTimeout(()=>{bar.classList.remove("show");undoStack=[];},7000);
}
function doUndo(){
  if(!undoStack.length)return;
  const entries=[...undoStack];
  undoStack=[];
  document.getElementById("undo-bar").classList.remove("show");
  if(undoTimer)clearTimeout(undoTimer);
  let p=Promise.resolve();
  entries.forEach(entry=>{
    p=p.then(()=>database.ref("reservations/"+safeKey(entry.label,entry.date)).set(entry));
  });
  p.then(()=>showToast("↩ Αναιρέθηκε","s")).catch(()=>showToast("Σφάλμα αναίρεσης","e"));
}

function openModal(uid,forceMode){
  const u=umbrellas.find(x=>x.uid===uid)||{uid,label:uid};
  const existing=reservations[u.label+"|"+selectedDate]||null;
  // Αν δεν υπάρχει σημερινή κράτηση, ψάξε μελλοντική
  let futureRes=null;
  if(!existing){
    futureRes=Object.values(reservations)
      .filter(r=>r.label===u.label&&r.date>selectedDate)
      .sort((a,b)=>a.date.localeCompare(b.date))[0]||null;
  }
  const activeRes=existing||null;
  const mode=forceMode||(existing?"view":futureRes?"future":"add");
  if(forceMode==="other_dates"){
    currentModal={uid:u.uid,label:u.label,mode:"other_dates"};
    currentForm={};
    renderModal();
    document.getElementById("res-overlay").style.display="flex";
    return;
  }
  currentModal={uid:u.uid,label:u.label,mode,futureDate:futureRes?futureRes.date:null};
  currentForm=existing
    ?{name:existing.name,time:existing.time||"",notes:existing.notes||"",status:existing.status||"booked",staff:existing.staff||""}
    :futureRes&&mode==="future"
    ?{name:futureRes.name,time:futureRes.time||"",notes:futureRes.notes||"",status:futureRes.status||"booked",staff:futureRes.staff||""}
    :{name:"",time:"10:00",notes:"",status:"booked",staff:""};

}

function saveRes(){
  const n=document.getElementById("f-name");   if(n)currentForm.name=n.value;
  const t=document.getElementById("f-time");   if(t)currentForm.time=t.value;
  const s=document.getElementById("f-staff");  if(s)currentForm.staff=s.value;
  const nt=document.getElementById("f-notes"); if(nt)currentForm.notes=nt.value;
  const fd=document.getElementById("f-date");  if(fd)currentForm.date=fd.value;
  const saveDate=currentForm.date||selectedDate;
  const entry={
    label:currentModal.label,date:saveDate,
    name:(currentForm.name||"").trim(),time:currentForm.time||"",
    notes:(currentForm.notes||"").trim(),status:currentForm.status||"booked",
    staff:currentForm.staff||"",updatedAt:new Date().toISOString(),
  };
  const oldDate=currentModal._editingOldDate;
  let p=Promise.resolve();
  // Αν επεξεργαστήκαμε μελλοντική κράτηση και άλλαξε η ημερομηνία, σβήσε την παλιά
  if(oldDate && oldDate!==saveDate){
    p=database.ref("reservations/"+safeKey(currentModal.label,oldDate)).remove();
  }
  p.then(()=>database.ref("reservations/"+safeKey(currentModal.label,saveDate)).set(entry))
    .then(()=>{showToast("✓ Αποθηκεύτηκε — Ομπρέλα "+currentModal.label,"s");closeModal();})
    .catch(()=>showToast("Σφάλμα αποθήκευσης","e"));
}

    cnt===0?`Δεν υπάρχουν κρατήσεις στις ${fmtDate(d)}.`
           :`Βρέθηκαν ${cnt} κρατήσεις στις ${fmtDate(d)}.`;
  // reset confirm αν άλλαξε ημ/νία
  clearPickerConfirmVisible=false;
  document.getElementById("clear-picker-confirm").style.display="none";
}
function doClearPickerDelete(){
  const d=document.getElementById("clear-date-inp").value;
  if(!d){showToast("Επίλεξε ημερομηνία","e");return;}
  const en=umbrellas.filter(u=>u.enabled);
  const toDel=en.filter(u=>reservations[u.label+"|"+d]);
  if(toDel.length===0){showToast("Δεν υπάρχουν κρατήσεις","i");closeClearPicker();return;}
  if(!clearPickerConfirmVisible){
    // πρώτο κλικ → δείξε επιβεβαίωση
    clearPickerConfirmVisible=true;
    document.getElementById("clear-confirm-count").textContent=toDel.length;
    document.getElementById("clear-picker-confirm").style.display="block";
    return;
  }
  // δεύτερο κλικ → διαγραφή
  let p=Promise.resolve();
  toDel.forEach(u=>{
    const entry=reservations[u.label+"|"+d];
    const trashId=uid();
    p=p.then(()=>database.ref("trash/"+trashId).set({...entry,trashId,deletedAt:new Date().toISOString()}))
       .then(()=>database.ref("reservations/"+safeKey(u.label,d)).remove());
  });
  p.then(()=>{closeClearPicker();showToast("Διαγράφηκαν "+toDel.length+" κρατήσεις ("+fmtDate(d)+")","i");})
   .catch(()=>showToast("Σφάλμα","e"));
}

// ══ HISTORY PANEL ══
let historyFilterDate="";
let historyDeleteConfirmDate="";

function renderHistoryPanel(){
  const allDates=[...new Set(Object.values(reservations).map(r=>r.date))].sort((a,b)=>b.localeCompare(a));
  const filteredDates=historyFilterDate?allDates.filter(d=>d===historyFilterDate):allDates;

  let html=`<div class="mtitle" style="margin-bottom:8px">📋 Ιστορικό Κρατήσεων</div>
  <div style="display:flex;align-items:center;gap:6px;margin-bottom:14px;flex-wrap:wrap;">
    <input type="date" id="hist-date-inp" class="finp" style="flex:1;min-width:130px;" value="${esc(historyFilterDate)}"
      onchange="historyFilterDate=this.value;historyDeleteConfirmDate='';renderHistoryPanel()"/>
    ${historyFilterDate?`<button style="border:none;background:#f1f5f9;color:#64748b;border-radius:8px;padding:7px 11px;font-size:12px;font-weight:700;cursor:pointer;" onclick="historyFilterDate='';historyDeleteConfirmDate='';renderHistoryPanel()">✕ Όλες</button>`:""}
  </div>`;

  if(allDates.length===0){
    html+=`<p style="color:#bbb;font-size:13px;text-align:center;padding:20px 0">Δεν υπάρχουν κρατήσεις.</p>`;
    document.getElementById("panel-body").innerHTML=html;
    return;
  }
  if(filteredDates.length===0){
    html+=`<p style="color:#bbb;font-size:13px;text-align:center;padding:20px 0">Δεν υπάρχουν κρατήσεις για αυτή την ημερομηνία.</p>`;
    document.getElementById("panel-body").innerHTML=html;
    return;
  }

  filteredDates.forEach(date=>{
    const dayRes=Object.values(reservations).filter(r=>r.date===date).sort((a,b)=>Number(a.label)-Number(b.label));
    const isToday=date===TODAY;
    const isPast=date<TODAY;
    const badge=isToday?'<span style="background:#059669;color:#fff;border-radius:6px;padding:1px 7px;font-size:10px;font-weight:800;margin-left:4px">ΣΗΜΕΡΑ</span>'
                :isPast?'<span style="background:#94a3b8;color:#fff;border-radius:6px;padding:1px 7px;font-size:10px;font-weight:800;margin-left:4px">ΠΑΡΕΛΘΟΝ</span>'
                       :'<span style="background:#f59e0b;color:#fff;border-radius:6px;padding:1px 7px;font-size:10px;font-weight:800;margin-left:4px">ΜΕΛΛΟΝ</span>';

    // Umbrella-style grid for this day (grouped by row)
    const rowNums=[...new Set(umbrellas.map(u=>u.row))].sort((a,b)=>a-b);
    let umbGridHtml="";
    rowNums.forEach(row=>{
      const rowUs=umbrellas.filter(u=>u.row===row&&u.enabled).sort((a,b)=>Number(a.label)-Number(b.label));
      const rowHasRes=rowUs.some(u=>dayRes.find(r=>r.label===u.label));
      if(!rowHasRes)return;
      const umbsH=rowUs.map(u=>{
        const res=dayRes.find(r=>r.label===u.label)||null;
        if(!res)return`<div style="width:50px;height:62px;border-radius:10px;border:1px dashed #ddd;opacity:.2;flex-shrink:0"></div>`;
        const sk=res.status||"booked";
        const st=STATUS[sk]||STATUS.booked;
        const nm=res.name.length>6?res.name.slice(0,5)+"…":res.name;
        const nc=sk==="special"?"#92400e":"rgba(255,255,255,.95)";
        const tc=sk==="special"?"#92400e":"rgba(255,255,255,.7)";
        const staffPart=res.staff?" · "+res.staff.split(" ")[0]:"";
        return `<div style="width:50px;height:62px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2px;flex-shrink:0;border:2px solid ${st.border};background:${st.bg};box-shadow:0 2px 8px rgba(0,0,0,.12);">
          <svg width="18" height="18" viewBox="0 0 24 24"><path d="M12 2C7 2 3 6.5 3 11h9v9c0 .55.45 1 1 1s1-.45 1-1v-9h9c0-4.5-4-9-11-9z" fill="${st.icon}"/></svg>
          <span style="font-size:11px;font-weight:900;line-height:1.2;color:${st.text}">${u.label}</span>
          <span style="font-size:10px;font-weight:700;line-height:1.15;text-align:center;max-width:46px;overflow:hidden;white-space:nowrap;color:${nc}">${esc(nm)}</span>
          <span style="font-size:8px;line-height:1.15;text-align:center;max-width:46px;overflow:hidden;white-space:nowrap;color:${tc}">${res.time||""}${staffPart}</span>
        </div>`;
      }).join("");
      umbGridHtml+=`<div style="display:flex;align-items:flex-start;margin-bottom:4px;">
        <div style="font-size:10px;font-weight:800;color:#059669;min-width:26px;padding-top:12px;text-align:right;padding-right:6px;flex-shrink:0;">${row*100}</div>
        <div style="display:flex;gap:4px;flex-wrap:wrap;padding-bottom:4px;">${umbsH}</div>
      </div>`;
    });

    const isConfirming=historyDeleteConfirmDate===date;
    const deleteBtn=isConfirming
      ?`<div style="display:flex;gap:5px;align-items:center;">
          <button onclick="historyDeleteDay('${date}')" style="border:none;background:#dc2626;color:#fff;border-radius:6px;padding:4px 9px;font-size:11px;font-weight:700;cursor:pointer;">⚠️ Επιβεβαίωση</button>
          <button onclick="historyDeleteConfirmDate='';renderHistoryPanel()" style="border:none;background:#f1f5f9;color:#64748b;border-radius:6px;padding:4px 8px;font-size:11px;font-weight:700;cursor:pointer;">Ακύρωση</button>
        </div>`
      :`<button onclick="historyDeleteConfirmDate='${date}';renderHistoryPanel()" style="border:none;background:#fee2e2;color:#dc2626;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700;cursor:pointer;">🗑</button>`;

    html+=`<div style="margin-bottom:18px">
      <div style="display:flex;align-items:center;gap:5px;margin-bottom:6px;padding-bottom:5px;border-bottom:2px solid #e2e8f0;flex-wrap:wrap;">
        <span style="font-weight:900;font-size:14px;color:#004d40">${fmtDate(date)}</span>${badge}
        <span style="font-size:12px;color:#888;margin-left:auto">${dayRes.length} κρατήσεις</span>
        <button onclick="setDate('${date}');closePanel()" style="border:none;background:#e0f7fa;color:#00796b;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700;cursor:pointer;">Προβολή</button>
        ${deleteBtn}
      </div>
      <div>${umbGridHtml}</div>
    </div>`;
  });

  document.getElementById("panel-body").innerHTML=html;
}

function historyDeleteDay(date){
  historyDeleteConfirmDate="";
  const toDel=Object.values(reservations).filter(r=>r.date===date);
  if(toDel.length===0){renderHistoryPanel();return;}
  let p=Promise.resolve();
  toDel.forEach(entry=>{
    const trashId=uid();
    p=p.then(()=>database.ref("trash/"+trashId).set({...entry,trashId,deletedAt:new Date().toISOString()}))
       .then(()=>database.ref("reservations/"+safeKey(entry.label,entry.date)).remove());
  });
  p.then(()=>{
    showToast("Διαγράφηκαν "+toDel.length+" κρατήσεις ("+fmtDate(date)+")","i");
    if(historyFilterDate===date)historyFilterDate="";
    renderHistoryPanel();
  }).catch(()=>showToast("Σφάλμα","e"));
}

// ══ PANELS ══
function openPanel(type){
  currentPanel=type;
  document.getElementById("panel-footer").style.display="none";
  if(type==="staff") renderStaffPanel();
  else if(type==="trash") renderTrashPanel();
  else if(type==="history"){historyFilterDate="";historyDeleteConfirmDate="";renderHistoryPanel();}
  document.getElementById("panel-overlay").style.display="flex";
}
function closePanel(){document.getElementById("panel-overlay").style.display="none";currentPanel=null;}

function renderStaffPanel(){
  const list=staff.length===0
    ?'<p style="color:#bbb;font-size:13px;text-align:center;padding:20px 0">Δεν υπάρχει προσωπικό.</p>'
    :staff.map(s=>`<div class="list-row"><span style="font-size:14px;font-weight:600">${esc(s)}</span>
      <button class="sbtn" style="background:#fee2e2;color:#dc2626" onclick="removeStaff('${esc(s)}')">Αφαίρεση</button></div>`).join("");
  document.getElementById("panel-body").innerHTML=`
    <div class="mtitle" style="margin-bottom:16px">Προσωπικό</div>
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <input class="finp" style="flex:1" id="staff-inp" placeholder="Όνομα…"
        onkeydown="if(event.key==='Enter')addStaff()" autocomplete="off"/>
      <button class="btn btn-save" style="flex:none;padding:0 16px;border-radius:10px" onclick="addStaff()">+</button>
    </div>${list}`;
}
function addStaff(){
  const inp=document.getElementById("staff-inp");
  const name=(inp?inp.value:"").trim();
  if(!name||staff.includes(name))return;
  const updated=[...staff,name];
  database.ref("config/staff").set(updated).then(()=>renderStaffPanel());
}
function removeStaff(name){
  database.ref("config/staff").set(staff.filter(s=>s!==name)).then(()=>renderStaffPanel());
}

let trashDeleteAllConfirm=false;
function renderTrashPanel(){
  const items=Object.values(trash).sort((a,b)=>(b.deletedAt||"").localeCompare(a.deletedAt||""));
  const list=items.length===0
    ?'<p style="color:#bbb;font-size:13px;text-align:center;padding:20px 0">Ο κάδος είναι άδειος.</p>'
    :items.map(item=>`<div class="list-row">
        <div>
          <div style="font-weight:700;font-size:13px">Ομπρέλα ${item.label} — ${esc(item.name)}</div>
          <div style="font-size:11px;color:#888">${fmtDate(item.date)} · ${item.time||""}${item.staff?" · "+esc(item.staff):""}</div>
          <div style="font-size:10px;color:#bbb">${new Date(item.deletedAt).toLocaleString("el-GR")}</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:5px">
          <button class="sbtn" style="background:#dcfce7;color:#166534" onclick="restoreItem('${item.trashId}')">&#8629;</button>
          <button class="sbtn" style="background:#f3f4f6;color:#6b7280" onclick="clearItem('${item.trashId}')">&#x2715;</button>
        </div></div>`).join("");
  const clearAllBtn=items.length===0?"":trashDeleteAllConfirm
    ?`<div style="display:flex;gap:6px;justify-content:flex-end;margin-bottom:10px">
        <button class="sbtn" style="background:#dc2626;color:#fff;font-size:12px" onclick="clearAllTrash()">&#9888; Επιβεβαίωση διαγραφής όλων</button>
        <button class="sbtn" style="background:#f3f4f6;color:#6b7280;font-size:12px" onclick="cancelClearAllTrash()">Ακύρωση</button>
      </div>`
    :`<div style="display:flex;gap:6px;justify-content:flex-end;margin-bottom:10px">
        <button class="sbtn" style="background:#dcfce7;color:#166534;font-size:12px" onclick="restoreAllTrash()">&#8629; Επαναφορά όλων</button>
        <button class="sbtn" style="background:#fee2e2;color:#dc2626;font-size:12px" onclick="showClearAllTrash()">&#128465; Διαγραφή όλων</button>
      </div>`;
  document.getElementById("panel-body").innerHTML=`<div class="mtitle" style="margin-bottom:12px">Κάδος (${items.length})</div>${clearAllBtn}${list}`;
}
function showClearAllTrash(){trashDeleteAllConfirm=true;renderTrashPanel();}
function cancelClearAllTrash(){trashDeleteAllConfirm=false;renderTrashPanel();}
function clearAllTrash(){
  trashDeleteAllConfirm=false;
  database.ref("trash").remove()
    .then(()=>{showToast("&#128465; Ο κάδος αδειάστηκε","s");renderTrashPanel();})
    .catch(()=>showToast("Σφάλμα","e"));
}
function restoreItem(trashId){
  const item=trash[trashId];if(!item)return;
  const{trashId:_,deletedAt,...entry}=item;
  database.ref("reservations/"+safeKey(entry.label,entry.date)).set(entry)
    .then(()=>database.ref("trash/"+trashId).remove())
    .then(()=>{showToast("↩ Επαναφέρθηκε!","s");renderTrashPanel();})
    .catch(()=>showToast("Σφάλμα","e"));
}
function clearItem(trashId){
  database.ref("trash/"+trashId).remove().then(()=>renderTrashPanel());
}

// ══ CONFIG ══
function openConfig(){
  cfgUmbs=JSON.parse(JSON.stringify(umbrellas));
  currentPanel="config";
  document.getElementById("panel-footer").style.display="flex";
  renderConfigPanel();
  document.getElementById("panel-overlay").style.display="flex";
}
function renderConfigPanel(){
  const rows=[...new Set(cfgUmbs.map(u=>u.row))].sort((a,b)=>a-b);
  const html=rows.map(row=>{
    const rowUs=cfgUmbs.filter(u=>u.row===row).sort((a,b)=>Number(a.label)-Number(b.label));
    const umbsH=rowUs.map(u=>`
      <div class="cu ${u.enabled?"on":"off"}">
        <input type="text" value="${esc(u.label)}" onchange="cfgSetLabel('${u.uid}',this.value)"/>
        <div class="cu-btns">
          <input type="checkbox" ${u.enabled?"checked":""} onchange="cfgToggle('${u.uid}')" style="accent-color:#059669;width:14px;height:14px"/>
          <button onclick="cfgRemoveUmb('${u.uid}')" style="border:none;background:none;color:#ef4444;cursor:pointer;font-weight:900;font-size:14px;padding:0;line-height:1">✕</button>
        </div></div>`).join("");
    return `<div style="margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span style="font-weight:800;font-size:13px;color:#004d40">Σειρά ${row*100}</span>
        <button class="sbtn" style="background:#fee2e2;color:#dc2626;font-size:11px;padding:3px 8px" onclick="cfgRemoveRow(${row})">Αφαίρεση σειράς</button>
      </div>
      <div class="cfg-umbs">${umbsH}
        <button class="cu-add" onclick="cfgAddUmb(${row})">+</button>
      </div></div>`;
  }).join("");
  document.getElementById("panel-body").innerHTML=`
    <div class="mtitle" style="margin-bottom:4px">⚙ Ομπρέλες</div>
    <div style="font-size:12px;color:#888;margin-bottom:14px">✕ = διαγραφή · ☑ = ενεργή · κλικ στον αριθμό = μετονομασία</div>
    ${html}<button class="add-row-btn" onclick="cfgAddRow()">+ Νέα σειρά</button>`;
}
function cfgToggle(uid){cfgUmbs=cfgUmbs.map(u=>u.uid===uid?{...u,enabled:!u.enabled}:u);renderConfigPanel();}
function cfgSetLabel(uid,val){cfgUmbs=cfgUmbs.map(u=>u.uid===uid?{...u,label:val}:u);}
function cfgAddUmb(row){
  const rowUs=cfgUmbs.filter(u=>u.row===row).sort((a,b)=>Number(a.label)-Number(b.label));
  const last=rowUs.length?Number(rowUs[rowUs.length-1].label):row*100;
  cfgUmbs=[...cfgUmbs,{uid:uid(),row,label:String(last+1),enabled:true}];
  renderConfigPanel();
}
function cfgRemoveUmb(id){cfgUmbs=cfgUmbs.filter(u=>u.uid!==id);renderConfigPanel();}
function cfgAddRow(){
  const maxRow=cfgUmbs.length?Math.max(...cfgUmbs.map(u=>u.row)):0;
  cfgUmbs=[...cfgUmbs,{uid:uid(),row:maxRow+1,label:String((maxRow+1)*100+1),enabled:true}];
  renderConfigPanel();
}
function cfgRemoveRow(row){cfgUmbs=cfgUmbs.filter(u=>u.row!==row);renderConfigPanel();}
function saveConfig(){
  database.ref("config/umbrellas").set(cfgUmbs)
    .then(()=>{closePanel();showToast("✓ Διάταξη αποθηκεύτηκε","s");})
    .catch(()=>showToast("Σφάλμα","e"));
}

// ══ TOAST ══
function showToast(msg,type){
  if(toastTimer)clearTimeout(toastTimer);
  const t=document.getElementById("toast");
  t.textContent=msg;t.className="toast "+type+" show";
  toastTimer=setTimeout(()=>t.classList.remove("show"),3000);
}

// ══ ZOOM ══
let zoomLevel = 1.0;
const ZOOM_MIN = 0.4, ZOOM_MAX = 2.0;
function applyZoom(){
  const el=document.getElementById("zoom-wrapper");
  const s=zoomLevel;
  el.style.transform=`scale(${s})`;
  el.style.transformOrigin="top left";
  el.style.width=`${100/s}%`;
  document.getElementById("zlvl").textContent=Math.round(s*100)+"%";
}
function zoomIn(){
  zoomLevel=Math.min(ZOOM_MAX,Math.round((zoomLevel+0.1)*10)/10);
  applyZoom();
}
function zoomOut(){
  zoomLevel=Math.max(ZOOM_MIN,Math.round((zoomLevel-0.1)*10)/10);
  applyZoom();
}
document.addEventListener("DOMContentLoaded",()=>{
  const zlvl=document.getElementById("zlvl");
  if(zlvl) zlvl.addEventListener("click",()=>{zoomLevel=1.0;applyZoom();});
});
